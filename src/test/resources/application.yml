# Configuración de Spring Boot para tests (integración y contexto).
# El datasource real se inyecta en tiempo de ejecución vía @DynamicPropertySource
# desde AbstractIntegrationTest (Testcontainers MySQL).

spring:
  application:
    name: vacapp-test

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

jwt:
  secret: test-secret-key-at-least-256-bits-32-bytes-for-hmac-sha256-algorithm
  expiration: 86400000
  issuer: vacapp-test

logging:
  level:
    root: WARN
    mx.vacapp: INFO
    org.hibernate.SQL: WARN
