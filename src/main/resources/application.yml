# Vacapp - Configuración Principal
# User Management Module - MySQL, JWT, Logging

spring:
  application:
    name: vacapp
  
  # Configuración de Base de Datos MySQL
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/vacapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USERNAME:vacapp_user}
    password: ${DATABASE_PASSWORD:vacapp_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # Configuración de Flyway (migraciones de base de datos)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Configuración JPA/Hibernate
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Configuración de Caché (Caffeine)
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=15m
    cache-names:
      - cattleStats
      - animalStats
  
  # Configuración de Thymeleaf
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
  
  # Configuración de recursos estáticos
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 3600

# Configuración de Seguridad JWT
jwt:
  secret: ${JWT_SECRET:vacapp-default-secret-key-minimum-256-bits-32-bytes-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 horas en milisegundos (24 * 60 * 60 * 1000)
  issuer: ${JWT_ISSUER:vacapp}

# Configuración de Logging
logging:
  level:
    root: INFO
    mx.vacapp: ${APP_LOG_LEVEL:INFO}
    mx.vacapp.users: ${USERS_LOG_LEVEL:INFO}
    mx.vacapp.users.internal.infrastructure.security: ${SECURITY_LOG_LEVEL:INFO}
    mx.vacapp.cattle: ${CATTLE_LOG_LEVEL:INFO}
    mx.vacapp.geography: ${GEOGRAPHY_LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.springframework.web: ${WEB_LOG_LEVEL:INFO}
    org.springframework.cache: ${CACHE_LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/vacapp.log}
    max-size: 10MB
    max-history: 30

# Configuración del Servidor
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    session:
      timeout: 30m
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# Configuración de OpenAPI/Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha

# Configuración de Aplicación Personalizada
vacapp:
  security:
    # Intentos de login permitidos antes de bloqueo
    max-login-attempts: 5
    # Duración del bloqueo temporal en minutos
    lockout-duration-minutes: 15
    # Ventana de tiempo para contar intentos fallidos en minutos
    failed-attempts-window-minutes: 15
    # Rate limiting para endpoints de autenticación (requests por minuto)
    auth-rate-limit: 5
  
  audit:
    # Retención de registros de auditoría en días
    retention-days: 730
  
  cors:
    # Orígenes permitidos para CORS (separados por coma)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:3000}
    # Métodos HTTP permitidos
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    # Headers permitidos
    allowed-headers: "*"
    # Permitir credenciales
    allow-credentials: true
  
  # Configuración del módulo cattle-inventory
  cattle:
    # Configuración de caché para estadísticas de ganado
    cache:
      # TTL (Time To Live) en minutos para estadísticas del módulo
      stats-ttl-minutes: 15
      # Tamaño máximo del caché de estadísticas
      stats-max-size: 1000
    
    # Configuración de validaciones
    validation:
      # Longitud mínima del arete (identificación del animal)
      arete-min-length: 4
      # Longitud máxima del arete
      arete-max-length: 20
      # Longitud máxima del folio REEMO
      folio-reemo-max-length: 50
    
    # Configuración de paginación
    pagination:
      # Tamaño de página por defecto para listados de ganado
      default-page-size: 100
      # Tamaño máximo de página permitido
      max-page-size: 500

# Perfiles de Spring
---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    mx.vacapp: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  secret: dev-secret-key-at-least-256-bits-32-bytes-for-hmac-sha256-algorithm

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none

logging:
  level:
    mx.vacapp: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

server:
  error:
    include-stacktrace: never
    include-exception: false
