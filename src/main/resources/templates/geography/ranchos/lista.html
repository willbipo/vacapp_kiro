<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranchos - Vacapp</title>
    <link rel="stylesheet" th:href="@{/css/geography/ranchos.css}" />
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1>Gestión de Ranchos</h1>
            <div class="actions">
                <input type="text" id="buscar" placeholder="Buscar rancho..." class="search-input" />
                <a th:href="@{/geography/ranchos/nuevo}" class="btn-primary">+ Nuevo Rancho</a>
            </div>
        </header>

        <!-- Mensajes Flash -->
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <!-- Grid de Cards -->
        <div class="ranchos-grid" id="ranchos-grid">
            <div th:each="rancho : ${ranchos}" class="rancho-card" th:attr="data-nombre=${rancho.nombre}">
                <div class="card-header">
                    <h3 th:text="${rancho.nombre}">Nombre Rancho</h3>
                    <span class="status-badge" th:classappend="${rancho.status == T(mx.vacapp.geography.internal.domain.model.GeographicStatus).ACTIVE ? 'active' : 'archived'}" 
                          th:text="${rancho.status}">ACTIVE</span>
                </div>
                <div class="card-body">
                    <div class="metric">
                        <span class="label">Superficie Total:</span>
                        <span class="value" th:text="${#numbers.formatDecimal(rancho.superficieTotal, 0, 'COMMA', 2, 'POINT')} + ' m²'">10,000.00 m²</span>
                    </div>
                    <div class="metric">
                        <span class="label">Superficie Disponible:</span>
                        <span class="value" th:text="${#numbers.formatDecimal(rancho.superficieDisponible, 0, 'COMMA', 2, 'POINT')} + ' m²'">5,000.00 m²</span>
                    </div>
                    <div class="metric">
                        <span class="label">Porcentaje de Uso:</span>
                        <span class="value percentage" th:text="${#numbers.formatDecimal((rancho.superficieUsada / rancho.superficieTotal) * 100, 0, 2)} + '%'">50.00%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" th:style="'width: ' + ${(rancho.superficieUsada / rancho.superficieTotal) * 100} + '%'"></div>
                    </div>
                </div>
                <div class="card-footer">
                    <a th:href="@{/geography/ranchos/{id}(id=${rancho.ranchoId})}" class="btn-link">Ver Detalle</a>
                    <a th:href="@{/geography/ranchos/{id}/editar(id=${rancho.ranchoId})}" class="btn-link">Editar</a>
                </div>
            </div>
        </div>

        <!-- Paginación -->
        <div class="pagination" th:if="${totalPages > 1}">
            <a th:href="@{/geography/ranchos(page=${currentPage - 1}, size=${pageSize})}" 
               th:classappend="${currentPage == 0 ? 'disabled' : ''}" class="page-link">← Anterior</a>
            <span class="page-info">Página <span th:text="${currentPage + 1}">1</span> de <span th:text="${totalPages}">1</span></span>
            <a th:href="@{/geography/ranchos(page=${currentPage + 1}, size=${pageSize})}" 
               th:classappend="${currentPage >= totalPages - 1 ? 'disabled' : ''}" class="page-link">Siguiente →</a>
        </div>
    </div>

    <script>
        // Búsqueda en tiempo real con debounce
        const buscarInput = document.getElementById('buscar');
        const ranchosGrid = document.getElementById('ranchos-grid');
        let timeoutId;

        buscarInput.addEventListener('input', function() {
            clearTimeout(timeoutId);
            timeoutId = setTimeout(() => {
                const query = this.value.toLowerCase().trim();
                const cards = ranchosGrid.querySelectorAll('.rancho-card');

                cards.forEach(card => {
                    const nombre = card.getAttribute('data-nombre').toLowerCase();
                    if (nombre.includes(query)) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            }, 300); // Debounce 300ms
        });
    </script>
</body>
</html>
