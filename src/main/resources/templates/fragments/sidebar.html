<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- Sidebar Fragment -->
    <aside th:fragment="sidebar" class="sidebar">
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item" data-page="dashboard">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>Dashboard</span>
            </a>

            <div class="nav-section">
                <div class="nav-section-title">Administración</div>
                
                <a href="/admin/usuarios" class="nav-item" data-page="usuarios">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <span>Usuarios</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Ganado</div>
                
                <a href="/ganado" class="nav-item" data-page="ganado">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                    <span>Inventario</span>
                </a>
                
                <a href="/salud" class="nav-item" data-page="salud">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <span>Salud</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Ubicación</div>
                
                <a href="/control-geografico" class="nav-item" data-page="control-geografico">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span>Control Geográfico</span>
                </a>
            </div>
        </nav>

        <script>
            // Script para el sidebar (ejecutado inline)
            (function() {
                // Marcar el item activo según la URL actual
                function marcarItemActivo() {
                    const path = window.location.pathname;
                    const items = document.querySelectorAll('.sidebar .nav-item');
                    
                    items.forEach(item => {
                        item.classList.remove('active');
                        const href = item.getAttribute('href');
                        
                        // Coincidencia exacta o por prefijo
                        if (path === href || (href !== '/dashboard' && path.startsWith(href))) {
                            item.classList.add('active');
                        }
                    });
                }

                // Ejecutar al cargar
                marcarItemActivo();
            })();
        </script>
    </aside>
</body>
</html>
